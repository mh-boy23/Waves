<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>HanzWave · feel the data, live the sound</title>
  <!-- Fonts & Icons -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0B0B0B;
      color: #f0f0f5;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    h1, h2, h3, .logo, .section-header {
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
    }
    /* brand colors */
    :root {
      --deep-black: #0B0B0B;
      --neon-green: #00FF9C;
      --digital-blue: #00C2FF;
      --card-bg: #15181e;
      --sidebar-bg: #0D0F14;
    }
    /* layout */
    .app {
      display: flex;
      flex: 1;
      min-height: 0;
    }
    /* sidebar */
    .sidebar {
      width: 280px;
      background: var(--sidebar-bg);
      padding: 28px 16px;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #22252c;
    }
    .logo-area {
      margin-bottom: 36px;
      padding-left: 8px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #00FF9C, #00C2FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 12px #00C2FF40;
    }
    .logo i {
      font-size: 2rem;
      color: #00FF9C;
      filter: drop-shadow(0 0 6px #00FF9C);
    }
    .founder-tag {
      font-size: 0.75rem;
      color: #888;
      margin-top: 4px;
      padding-left: 12px;
      letter-spacing: 0.3px;
    }
    .nav-menu {
      flex: 1;
    }
    .nav-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 16px;
      margin: 4px 0;
      border-radius: 14px;
      color: #b0b0c8;
      font-weight: 500;
      transition: all 0.15s;
      cursor: pointer;
    }
    .nav-item i {
      width: 24px;
      font-size: 1.2rem;
    }
    .nav-item.active {
      background: #1F2530;
      color: white;
      border-left: 3px solid var(--neon-green);
    }
    .nav-item:hover:not(.active) {
      background: #1A1E26;
      color: #e0e0ff;
    }
    .slogan-side {
      margin-top: 24px;
      padding: 16px;
      font-size: 0.8rem;
      color: #00C2FF;
      border-top: 1px solid #2a2e38;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    /* main */
    .main-panel {
      flex: 1;
      background: #0B0B0B;
      padding: 24px 32px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 28px;
    }
    .page-title {
      font-size: 2rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, #b0f0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    .user-profile {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .avatar {
      width: 44px;
      height: 44px;
      background: linear-gradient(145deg, #00C2FF, #00FF9C);
      border-radius: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #0B0B0B;
    }
    .upload-btn {
      background: transparent;
      border: 1.5px solid #00FF9C;
      color: #00FF9C;
      padding: 10px 22px;
      border-radius: 40px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.2s;
    }
    .upload-btn:hover {
      background: #00FF9C20;
      border-color: #00C2FF;
      color: white;
    }
    /* tabs */
    .view-tabs {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      border-bottom: 1px solid #2a2e38;
      padding-bottom: 8px;
    }
    .tab {
      font-weight: 600;
      padding: 8px 0;
      color: #9a9ab0;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: 0.1s;
    }
    .tab.active {
      color: white;
      border-bottom: 3px solid #00FF9C;
    }
    /* library grid */
    .track-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 22px;
    }
    .track-card {
      background: #13171e;
      border-radius: 20px;
      padding: 16px 14px 14px;
      border: 1px solid #252b36;
      transition: 0.15s;
      cursor: pointer;
    }
    .track-card:hover {
      background: #1c212b;
      border-color: #00C2FF60;
    }
    .card-art {
      width: 100%;
      aspect-ratio: 1/1;
      background: linear-gradient(145deg, #1e2632, #0f131a);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      color: #00FF9C;
      font-size: 2.4rem;
      box-shadow: 0 8px 0 #00000030;
    }
    .track-title {
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-artist {
      font-size: 0.9rem;
      color: #9aa0b0;
    }
    .card-footer {
      display: flex;
      justify-content: space-between;
      margin-top: 14px;
    }
    .play-card {
      background: #00C2FF;
      border: none;
      width: 38px;
      height: 38px;
      border-radius: 50%;
      color: #0B0B0B;
      font-size: 1rem;
      cursor: pointer;
    }
    .support-btn {
      background: transparent;
      border: 1px solid #00FF9C;
      color: #00FF9C;
      border-radius: 30px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 600;
    }
    /* data mode dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
    }
    .stat-card {
      background: #11161e;
      border-radius: 24px;
      padding: 22px;
      border: 1px solid #2a3340;
    }
    .stat-value {
      font-size: 2.8rem;
      font-weight: 700;
      color: #00FF9C;
    }
    .insight-btn {
      background: #00C2FF20;
      border: 1px solid #00C2FF;
      color: #00C2FF;
      padding: 14px 24px;
      border-radius: 50px;
      margin-top: 24px;
      font-weight: 600;
      cursor: pointer;
      width: fit-content;
    }
    /* player bar */
    .player-bar {
      background: #0D1117;
      border-top: 1px solid #1F2833;
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      box-shadow: 0 -4px 20px #00000080;
    }
    .now-playing {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 260px;
    }
    .np-art {
      width: 54px;
      height: 54px;
      background: #1B232E;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #00FF9C;
    }
    .wave-visual {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-left: 12px;
    }
    .wave-bar {
      width: 4px;
      height: 20px;
      background: #00C2FF;
      border-radius: 4px;
      animation: wave 1.2s ease-in-out infinite;
    }
    @keyframes wave {
      0%,100% { height: 12px; }
      50% { height: 28px; background: #00FF9C; }
    }
    .player-controls {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .ctrl-buttons {
      display: flex;
      gap: 28px;
    }
    .ctrl-btn {
      background: none;
      border: none;
      color: #ddd;
      font-size: 1.4rem;
      cursor: pointer;
    }
    .play-pause {
      background: white;
      color: #0B0B0B;
      width: 50px;
      height: 50px;
      border-radius: 50%;
    }
    .progress-area {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 80%;
    }
    .seek-slider {
      flex: 1;
      height: 5px;
      background: #2a3a4a;
    }
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: #000000b0;
      backdrop-filter: blur(6px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal {
      background: #151e28;
      border-radius: 32px;
      padding: 32px;
      width: 460px;
      border: 1px solid #00C2FF40;
    }
    .toast {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      background: #00C2FF;
      color: #0B0B0B;
      font-weight: 600;
      padding: 12px 28px;
      border-radius: 60px;
      z-index: 2000;
      opacity: 0;
      transition: 0.2s;
    }
    .insight-modal-content {
      color: #ddd;
    }
  </style>
</head>
<body>

<!-- Toast -->
<div id="toast" class="toast">✓ Action completed</div>

<!-- Upload Modal -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal">
    <h2 style="color:#00FF9C; margin-bottom:24px;"><i class="fas fa-cloud-upload-alt"></i> Upload your sound</h2>
    <div style="margin-bottom:20px"><label>Title</label><input id="titleInp" style="width:100%; padding:14px; background:#0f1a24; border:1px solid #2a4a5a; border-radius:16px; color:white;" placeholder="Afro wave"></div>
    <div style="margin-bottom:20px"><label>Artist</label><input id="artistInp" style="width:100%; padding:14px; background:#0f1a24; border:1px solid #2a4a5a; border-radius:16px; color:white;" placeholder="Hanz Domingos"></div>
    <div style="margin-bottom:28px"><label>Audio</label><input type="file" id="fileInp" accept="audio/*" style="color:white;"></div>
    <div style="display:flex; gap:12px;">
      <button id="cancelModal" style="flex:1; padding:14px; background:#2a3a4a; border:none; border-radius:40px; color:white;">Cancel</button>
      <button id="uploadConfirm" style="flex:1; padding:14px; background:#00C2FF; border:none; border-radius:40px; font-weight:700;">Upload</button>
    </div>
  </div>
</div>

<!-- Weekly Insight Modal -->
<div class="modal-overlay" id="insightModal">
  <div class="modal insight-modal-content">
    <h2 style="color:#00FF9C;">📊 Weekly Insight Report</h2>
    <div style="margin:24px 0;" id="insightText">Loading your listening DNA...</div>
    <button id="closeInsight" style="background:#00C2FF; border:none; padding:14px 28px; border-radius:40px; font-weight:700;">Close</button>
  </div>
</div>

<div class="app">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="logo-area">
      <div class="logo">
        <i class="fas fa-wave-square"></i> HanzWave
      </div>
      <div class="founder-tag">by Hanz Domingos · feel the data, live the sound</div>
    </div>
    <div class="nav-menu">
      <div class="nav-item active" data-view="library"><i class="fas fa-home"></i> Home</div>
      <div class="nav-item" data-view="library"><i class="fas fa-compact-disc"></i> Library</div>
      <div class="nav-item" data-view="data"><i class="fas fa-chart-pie"></i> Data Mode 🔥</div>
      <div class="nav-item"><i class="fas fa-search"></i> Search</div>
      <div class="nav-item"><i class="fas fa-user-circle"></i> Profile</div>
    </div>
    <div class="slogan-side">
      <i class="fas fa-map-pin"></i> Maputo · Africa<br>
      <span style="color:#888;">Intelligent listening</span>
    </div>
  </div>

  <!-- Main Panel -->
  <div class="main-panel">
    <div class="top-bar">
      <span class="page-title" id="viewTitle">🎧 Your Library</span>
      <div class="user-profile">
        <button class="upload-btn" id="topUploadBtn"><i class="fas fa-plus-circle"></i> Upload</button>
        <div class="avatar">HD</div>
      </div>
    </div>
    <!-- Tabs (dynamic) -->
    <div class="view-tabs" id="viewTabs">
      <div class="tab active" data-tab="library">🎵 Library</div>
      <div class="tab" data-tab="data">📊 Data Dashboard</div>
    </div>
    <!-- Dynamic content container -->
    <div id="contentArea"></div>
  </div>
</div>

<!-- Player Bar -->
<div class="player-bar">
  <div class="now-playing">
    <div class="np-art" id="npArt"><i class="fas fa-music"></i></div>
    <div>
      <div id="npTitle" style="font-weight:600;">Not playing</div>
      <div id="npArtist" style="font-size:0.85rem; color:#aaa;">—</div>
    </div>
    <div class="wave-visual" id="waveVisual">
      <div class="wave-bar" style="animation-delay:0s"></div><div class="wave-bar" style="animation-delay:0.2s"></div><div class="wave-bar" style="animation-delay:0.4s"></div><div class="wave-bar" style="animation-delay:0.1s"></div><div class="wave-bar" style="animation-delay:0.3s"></div>
    </div>
  </div>
  <div class="player-controls">
    <div class="ctrl-buttons">
      <button class="ctrl-btn" id="shuffleBtn"><i class="fas fa-random"></i></button>
      <button class="ctrl-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
      <button class="ctrl-btn play-pause" id="playPauseBtn"><i class="fas fa-play"></i></button>
      <button class="ctrl-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
      <button class="ctrl-btn" id="repeatBtn"><i class="fas fa-redo-alt"></i></button>
    </div>
    <div class="progress-area">
      <span id="currentTime">0:00</span>
      <input type="range" class="seek-slider" id="seekSlider" min="0" max="100" value="0" step="0.1">
      <span id="durationTime">0:00</span>
    </div>
  </div>
  <div style="display:flex; gap:12px;">
    <i class="fas fa-volume-up" style="color:#00C2FF;"></i>
    <input type="range" id="volumeSlider" min="0" max="1" step="0.05" value="0.8" style="width:80px;">
  </div>
</div>

<script>
  (function(){
    // ----- STATE -----
    let tracks = []; // { id, title, artist, file, url }
    let currentIndex = -1;
    let audio = new Audio();
    let isPlaying = false;
    let listeningStats = {
      totalSeconds: 0,
      topArtists: {},
      genres: { 'Afrobeats': 45, 'Amapiano': 30, 'Hip-Hop': 20, 'R&B': 5 }
    };
    
    // Load from localStorage
    try {
      const saved = localStorage.getItem('hanzwave_tracks');
      if(saved) {
        const parsed = JSON.parse(saved);
        tracks = parsed.map(t => ({...t, url: t.url, file: null}));
      }
      const stats = localStorage.getItem('hanzwave_stats');
      if(stats) listeningStats = JSON.parse(stats);
    } catch(e){}
    
    // DOM elements
    const contentArea = document.getElementById('contentArea');
    const viewTitle = document.getElementById('viewTitle');
    const tabs = document.querySelectorAll('.tab');
    const navItems = document.querySelectorAll('.nav-item[data-view]');
    let currentView = 'library'; // library or data
    
    const npTitle = document.getElementById('npTitle'), npArtist = document.getElementById('npArtist'), npArt = document.getElementById('npArt');
    const playPauseBtn = document.getElementById('playPauseBtn');
    const seekSlider = document.getElementById('seekSlider');
    const currentTimeSpan = document.getElementById('currentTime');
    const durationSpan = document.getElementById('durationTime');
    const volumeSlider = document.getElementById('volumeSlider');
    const waveVisual = document.getElementById('waveVisual');
    
    const uploadModal = document.getElementById('uploadModal');
    const insightModal = document.getElementById('insightModal');
    const toast = document.getElementById('toast');
    
    // helper
    function formatTime(s) { if(isNaN(s)) return '0:00'; const m=Math.floor(s/60); const sec=Math.floor(s%60); return `${m}:${sec.toString().padStart(2,'0')}`; }
    function showToast(msg) { toast.textContent=msg; toast.style.opacity=1; setTimeout(()=>toast.style.opacity=0,2000); }
    function saveState() {
      localStorage.setItem('hanzwave_tracks', JSON.stringify(tracks.map(t=>({...t, url:t.url, file:null}))));
      localStorage.setItem('hanzwave_stats', JSON.stringify(listeningStats));
    }
    
    // Update player UI
    function updatePlayerUI() {
      if(currentIndex>=0 && tracks[currentIndex]) {
        const t = tracks[currentIndex];
        npTitle.textContent = t.title; npArtist.textContent = t.artist;
        npArt.innerHTML = '<i class="fas fa-music"></i>';
      } else {
        npTitle.textContent = 'Not playing'; npArtist.textContent = '—';
      }
    }
    
    // Play track
    function playTrack(index) {
      if(index<0||index>=tracks.length) return;
      if(currentIndex===index) {
        if(audio.paused) { audio.play(); isPlaying=true; playPauseBtn.innerHTML='<i class="fas fa-pause"></i>'; }
        else { audio.pause(); isPlaying=false; playPauseBtn.innerHTML='<i class="fas fa-play"></i>'; }
        return;
      }
      currentIndex = index;
      audio.src = tracks[index].url;
      audio.volume = volumeSlider.value;
      audio.play().then(()=>{ isPlaying=true; playPauseBtn.innerHTML='<i class="fas fa-pause"></i>'; }).catch(e=>console.warn);
      updatePlayerUI();
      // start tracking time
    }
    
    // Audio events
    audio.addEventListener('timeupdate', ()=>{
      seekSlider.value = audio.currentTime;
      currentTimeSpan.textContent = formatTime(audio.currentTime);
      // simulate listening time accumulation
      if(!audio.paused) {
        listeningStats.totalSeconds += 0.1; // approx
        if(listeningStats.totalSeconds > 3600*100) listeningStats.totalSeconds = 3600*100;
        // increment top artist
        if(currentIndex>=0) {
          const art = tracks[currentIndex].artist;
          listeningStats.topArtists[art] = (listeningStats.topArtists[art]||0)+0.05;
        }
        saveState();
      }
    });
    audio.addEventListener('loadedmetadata', ()=>{ durationSpan.textContent=formatTime(audio.duration); seekSlider.max=audio.duration; });
    audio.addEventListener('ended', ()=>{ if(tracks.length) playTrack((currentIndex+1)%tracks.length); });
    audio.addEventListener('play', ()=>{ playPauseBtn.innerHTML='<i class="fas fa-pause"></i>'; waveVisual.style.opacity=1; });
    audio.addEventListener('pause', ()=>{ playPauseBtn.innerHTML='<i class="fas fa-play"></i>'; });
    
    seekSlider.addEventListener('input', (e)=> { if(audio.src) audio.currentTime = e.target.value; });
    volumeSlider.addEventListener('input', (e)=> audio.volume = e.target.value);
    playPauseBtn.addEventListener('click', ()=>{
      if(tracks.length && currentIndex===-1) playTrack(0);
      else if(currentIndex>=0) {
        if(audio.paused) audio.play(); else audio.pause();
      }
    });
    document.getElementById('prevBtn').addEventListener('click', ()=>{
      if(tracks.length) playTrack((currentIndex-1+tracks.length)%tracks.length);
    });
    document.getElementById('nextBtn').addEventListener('click', ()=>{
      if(tracks.length) playTrack((currentIndex+1)%tracks.length);
    });
    
    // Render library
    function renderLibrary() {
      if(!tracks.length) return `<div style="padding:40px;text-align:center;color:#888;"><i class="fas fa-cloud-upload-alt" style="font-size:3rem;"></i><br>No tracks yet. Upload your music.</div>`;
      let html = '<div class="track-grid">';
      tracks.forEach((t,i)=>{
        html += `<div class="track-card" data-index="${i}">
          <div class="card-art"><i class="fas fa-music"></i></div>
          <div class="track-title">${escape(t.title)}</div>
          <div class="track-artist">${escape(t.artist)}</div>
          <div class="card-footer">
            <button class="play-card" data-play="${i}"><i class="fas fa-play"></i></button>
            <button class="support-btn" data-support="${i}"><i class="fas fa-heart"></i> Support</button>
          </div>
        </div>`;
      });
      html+='</div>';
      return html;
    }
    function escape(s){ return String(s).replace(/[&<>"]/g, c=> ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'})[c]); }
    
    // Render dashboard
    function renderDashboard() {
      const hours = (listeningStats.totalSeconds/3600).toFixed(1);
      const top = Object.entries(listeningStats.topArtists).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]).join(', ') || '—';
      const favGenre = Object.entries(listeningStats.genres).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'Afrobeats';
      return `
        <div class="dashboard-grid">
          <div class="stat-card"><i class="fas fa-clock" style="color:#00C2FF;"></i><div class="stat-value">${hours}h</div><div>Total listening</div></div>
          <div class="stat-card"><i class="fas fa-user"></i><div class="stat-value">${Object.keys(listeningStats.topArtists).length}</div><div>Artists discovered</div></div>
          <div class="stat-card"><i class="fas fa-chart-line"></i><div class="stat-value">${favGenre}</div><div>Top genre</div></div>
        </div>
        <div style="margin-top:30px;">
          <h3 style="color:#00FF9C;">🧠 Top artists</h3>
          <div style="background:#1b2530; border-radius:20px; padding:20px; margin-top:12px;">${top || 'Listen to more tracks'}</div>
        </div>
        <button class="insight-btn" id="generateInsightBtn"><i class="fas fa-file-alt"></i> Generate Weekly Insight Report</button>
      `;
    }
    
    function refreshView() {
      if(currentView==='library') {
        viewTitle.textContent = '🎧 Your Library';
        contentArea.innerHTML = renderLibrary();
        attachCardEvents();
      } else {
        viewTitle.textContent = '📊 Data Mode · insights';
        contentArea.innerHTML = renderDashboard();
        document.getElementById('generateInsightBtn')?.addEventListener('click', ()=>{
          const report = `HanzWave Weekly: You've listened ${(listeningStats.totalSeconds/3600).toFixed(1)}h. Top artist: ${Object.entries(listeningStats.topArtists).sort((a,b)=>b[1]-a[1])[0]?.[0] || 'various'}. Your mood: energetic. Keep streaming!`;
          document.getElementById('insightText').innerText = report;
          insightModal.style.display='flex';
        });
      }
    }
    
    function attachCardEvents() {
      document.querySelectorAll('[data-play]').forEach(b=> b.addEventListener('click', e=>{ e.stopPropagation(); playTrack(parseInt(b.dataset.play)); }));
      document.querySelectorAll('[data-support]').forEach(b=> b.addEventListener('click', e=>{ e.stopPropagation(); showToast('💚 Supporting artist (demo)'); }));
      document.querySelectorAll('.track-card').forEach(c=> c.addEventListener('click', e=>{ if(!e.target.closest('button')) playTrack(parseInt(c.dataset.index)); }));
    }
    
    // Switch view
    function setView(view) {
      currentView = view;
      tabs.forEach(t=> t.classList.toggle('active', t.dataset.tab===view));
      navItems.forEach(n=> n.classList.toggle('active', n.dataset.view===view));
      refreshView();
    }
    
    tabs.forEach(t=> t.addEventListener('click', ()=> setView(t.dataset.tab)));
    navItems.forEach(n=> n.addEventListener('click', ()=> { if(n.dataset.view) setView(n.dataset.view); }));
    
    // Upload
    document.getElementById('topUploadBtn').addEventListener('click', ()=> uploadModal.style.display='flex');
    document.getElementById('sidebarUploadBtn')?.addEventListener('click', ()=> uploadModal.style.display='flex');
    document.getElementById('cancelModal').addEventListener('click', ()=> uploadModal.style.display='none');
    document.getElementById('uploadConfirm').addEventListener('click', ()=>{
      const title = document.getElementById('titleInp').value.trim();
      const artist = document.getElementById('artistInp').value.trim() || 'Hanz Domingos';
      const file = document.getElementById('fileInp').files[0];
      if(!file || !title) { showToast('Title and file required'); return; }
      const url = URL.createObjectURL(file);
      tracks.push({ id:Date.now(), title, artist, url, file:null });
      saveState();
      uploadModal.style.display='none';
      showToast(`✓ "${title}" uploaded`);
      if(currentView==='library') refreshView(); else setView('library');
      if(tracks.length===1) playTrack(0);
    });
    
    document.getElementById('closeInsight').addEventListener('click', ()=> insightModal.style.display='none');
    
    // initial
    setView('library');
    updatePlayerUI();
    
    // founder touch
    console.log('HanzWave · Hanz Domingos · feel the data, live the sound');
  })();
</script>
<!-- Additional upload trigger from sidebar button (missing id fix) -->
<script>document.getElementById('sidebarUploadBtn')?.addEventListener('click',()=>document.getElementById('uploadModal').style.display='flex');</script>
</body>
</html>
